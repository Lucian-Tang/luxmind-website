<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>淬言 Quench Talk — 淬炼想法，不吐不快</title>
  <meta name="description" content="淬言是Luxmind旗下的AI产品讨论门户，淬炼想法，不吐不快。">
  <style>
    /* Auth Modal for editor entry */
    .auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.7); display: none;
      align-items: center; justify-content: center;
    }
    .auth-overlay.active { display: flex; }
    .auth-modal {
      background: #141416; border: 1px solid #2a2a2e;
      border-radius: 12px; padding: 40px; max-width: 380px; width: 90%;
      text-align: center;
    }
    .auth-modal h2 { font-size: 20px; margin-bottom: 4px; color: #e4e4e7; }
    .auth-modal p { color: #71717a; font-size: 14px; margin-bottom: 24px; }
    .auth-modal input {
      width: 100%; padding: 12px 16px; border: 1px solid #2a2a2e;
      border-radius: 8px; background: #1a1a1e;
      color: #e4e4e7; font-size: 16px; text-align: center;
      outline: none;
    }
    .auth-modal input:focus { border-color: #a78bfa; }
    .auth-modal .auth-error { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; }
    .auth-modal .btn { 
      width: 100%; margin-top: 16px; padding: 10px 24px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #a78bfa); color: #fff;
      border: none; cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .edit-entry {
      position: fixed; bottom: 24px; right: 24px; z-index: 50;
      width: 40px; height: 40px; border-radius: 50%;
      background: #141416; border: 1px solid #2a2a2e;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; transition: all 0.2s;
      opacity: 0.9;
    }
    .edit-entry:hover { opacity: 1; border-color: #a78bfa; }
  </style>
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-card: #141416;
      --bg-hover: #1a1a1d;
      --border: #2a2a2e;
      --text: #e4e4e7;
      --text-dim: #71717a;
      --text-muted: #52525c;
      --accent: #a78bfa;
      --accent-2: #6366f1;
      --tag-bg: #1a1525;
      --tag-text: #a78bfa;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10, 10, 11, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .nav-title {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-home {
      color: var(--text-dim); text-decoration: none; font-size: 14px;
      transition: color 0.2s;
    }
    .nav-home:hover { color: var(--text); }

    /* Hero */
    .hero {
      text-align: center; padding: 60px 24px 40px;
    }
    .hero h1 {
      font-size: 42px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px;
    }
    .hero h1 .gradient {
      background: linear-gradient(135deg, var(--accent), #c084fc, var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: var(--text-dim); font-size: 18px; max-width: 500px; margin: 0 auto;
    }

    /* Filters */
    .filters {
      max-width: 1100px; margin: 0 auto; padding: 0 24px 32px;
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .filter-tag {
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-dim); font-size: 14px;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-tag:hover { border-color: var(--accent); color: var(--text); }
    .filter-tag.active {
      background: var(--tag-bg); border-color: var(--accent); color: var(--accent);
    }

    /* Articles */
    .articles {
      max-width: 1100px; margin: 0 auto; padding: 0 24px 60px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .article-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 32px;
      transition: all 0.25s; cursor: pointer; text-decoration: none; color: inherit;
      display: block;
    }
    .article-card:hover {
      background: var(--bg-hover); border-color: #3a3a42;
      transform: translateY(-2px);
    }
    .article-card .meta {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
      font-size: 13px; color: var(--text-muted);
    }
    .article-card .meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); }
    .article-card h3 {
      font-size: 22px; font-weight: 700; margin-bottom: 8px;
      color: var(--text); line-height: 1.3;
    }
    .article-card p {
      color: var(--text-dim); font-size: 15px; line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-card .footer-meta {
      display: flex; align-items: center; gap: 12px; margin-top: 14px;
      font-size: 13px; color: var(--text-muted);
    }
    .tag-badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      background: var(--tag-bg); color: var(--tag-text); font-size: 12px;
      font-weight: 500;
    }

    /* Empty state */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty p { font-size: 15px; }

    /* Loading */
    .loading {
      text-align: center; padding: 40px; color: var(--text-muted);
      font-size: 15px;
    }
    .spinner {
      display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .hero h1 { font-size: 30px; }
      .hero p { font-size: 16px; }
      .article-card { padding: 20px; }
      .article-card h3 { font-size: 18px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <span class="nav-title">淬言 Quench Talk</span>
    <a href="/" class="nav-home">← 首页</a>
  </div>
</nav>

<section class="hero">
  <h1>淬言 <span class="gradient">Quench Talk</span></h1>
  <p>淬炼想法，不吐不快</p>
</section>

<div class="filters" id="filters">
  <span class="filter-tag active" data-tag="all">全部</span>
  <span class="filter-tag" data-tag="AI哲学">AI哲学</span>
  <span class="filter-tag" data-tag="AI产品">AI产品</span>
  <span class="filter-tag" data-tag="AI杂谈">AI杂谈</span>
  <span class="filter-tag" data-tag="AI其他">AI其他</span>
</div>

<div class="articles" id="articles">
  <div class="loading"><div class="spinner"></div><p>加载中…</p></div>
</div>

<script>
(async function() {
  const articlesEl = document.getElementById('articles');
  const filtersEl = document.getElementById('filters');

  let articles = [];
  let views = {};
  let activeTag = 'all';

  // Load views
  try {
    const vr = await fetch('/quench/data/views.json');
    if (vr.ok) views = await vr.json();
  } catch(e) {}

  // Load articles
  try {
    const res = await fetch('/quench/data/index.json');
    if (!res.ok) throw new Error('Failed to load index (HTTP ' + res.status + ')');
    const data = await res.json();
    articles = data.articles || [];
    if (articles.length === 0) throw new Error('No articles in index');
  } catch(e) {
    articlesEl.innerHTML = '<div class="empty"><p>📭 加载失败: ' + e.message + '</p></div>';
    return;
  }

  function renderArticles(filter) {
    const filtered = filter === 'all'
      ? articles
      : articles.filter(a => a.tags && a.tags.includes(filter));

    if (filtered.length === 0) {
      articlesEl.innerHTML = '<div class="empty"><p>暂无文章</p></div>';
      return;
    }

    articlesEl.innerHTML = filtered.map(a => {
      const tagBadges = (a.tags || []).map(t => `<span class="tag-badge">${t}</span>`).join(' ');
      const viewCount = views[a.slug] || 0;
      return `
        <a class="article-card" href="/quench/article.html?slug=${a.slug}">
          <div class="meta">
            ${tagBadges}
            <span class="dot"></span>
            <span>${a.date}</span>
          </div>
          <h3>${a.title}</h3>
          <p>${a.excerpt || ''}</p>
          <div class="footer-meta">
            <span>⏱ ${a.readingTime || '?'}</span>
            <span>👁 ${viewCount} 次阅读</span>
          </div>
        </a>
      `;
    }).join('');
  }

  // Filter click
  filtersEl.addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-tag')) return;
    activeTag = e.target.dataset.tag;
    filtersEl.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    renderArticles(activeTag);
  });

  renderArticles('all');
})();
</script>

<!-- Auth Modal -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-modal">
    <h2>🔑 写文章</h2>
    <p>输入访问密码</p>
    <input type="password" id="authPass" placeholder="密码…" autocomplete="off"
      onkeydown="if(event.key==='Enter') openEditor()">
    <div class="auth-error" id="authError">密码错误</div>
    <button class="btn" onclick="openEditor()">确认</button>
  </div>
</div>

<!-- Editor entry (subtle) -->
<div class="edit-entry" onclick="showAuth()" title="写文章">✏️</div>

<script>
// Client-side auth (SHA256 hash, no mixed content)
const AUTH_HASH = '95ba678abc03e65eb5f675505888d4da17a5d1329cdc40751c31d256d55bf377';

function showAuth() {
  document.getElementById('authOverlay').classList.add('active');
  document.getElementById('authPass').focus();
}

async function openEditor() {
  const pass = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';
  try {
    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass))
      .then(h => Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join(''));
    if (hash === AUTH_HASH) {
      sessionStorage.setItem('quench_auth', '1');
      window.location.href = '/quench/edit.html';
    } else {
      errEl.style.display = 'block';
      document.getElementById('authPass').value = '';
    }
  } catch(e) {
    // Fallback for old browsers: simple comparison
    if (pass === 'luxmind2026') {
      sessionStorage.setItem('quench_auth', '1');
      window.location.href = '/quench/edit.html';
    } else {
      errEl.style.display = 'block';
      document.getElementById('authPass').value = '';
    }
  }
}
</script>

</body>
</html>
